<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <linearGradient id="lg-bg" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#147263"/>
      <stop offset="1" stop-color="#0A4339"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="84" height="84" rx="22" fill="url(#lg-bg)"/>
  <!-- Aufsteigende Form aus zwei zusammenlaufenden Strichen = Wachstum + Zusammenarbeit -->
  <path d="M30 64 L48 30 L66 64" stroke="#FAF7F1" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Querverbindung (Brücke zwischen Menschen) -->
  <path d="M38.5 49 L57.5 49" stroke="#EFA73E" stroke-width="8.5" stroke-linecap="round"/>
  <!-- Funke / Spitze -->
  <circle cx="48" cy="27" r="6" fill="#EFA73E"/>
</svg>
