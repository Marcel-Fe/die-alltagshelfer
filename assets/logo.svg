<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <defs>
    <linearGradient id="lg-platform" x1="16" y1="18" x2="82" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B8273"/>
      <stop offset="1" stop-color="#0B4A41"/>
    </linearGradient>
    <linearGradient id="lg-platform-top" x1="20" y1="16" x2="78" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2EA08D"/>
      <stop offset="1" stop-color="#147263"/>
    </linearGradient>
    <linearGradient id="lg-fig-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6BE5F"/>
      <stop offset="1" stop-color="#E89B2F"/>
    </linearGradient>
    <linearGradient id="lg-fig-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E907E"/>
      <stop offset="1" stop-color="#0C5249"/>
    </linearGradient>
    <linearGradient id="lg-fig-coral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F58E72"/>
      <stop offset="1" stop-color="#E0633F"/>
    </linearGradient>
  </defs>

  <!-- Bodenschatten -->
  <ellipse cx="48" cy="88" rx="30" ry="5" fill="#11302C" opacity="0.12"/>

  <!-- Schwebende Plattform (digitale Ebene) -->
  <g transform="rotate(-7 48 27)">
    <rect x="14" y="22" width="68" height="15" rx="7.5" fill="url(#lg-platform)"/>
    <rect x="14" y="20" width="68" height="13" rx="6.5" fill="url(#lg-platform-top)"/>
    <!-- KI-Knoten auf der Plattform -->
    <circle cx="27" cy="26.5" r="3.2" fill="#F6BE5F"/>
    <rect x="35" y="24" width="22" height="5" rx="2.5" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="66" cy="26.5" r="2.4" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="74" cy="26.5" r="1.6" fill="#FFFFFF" opacity="0.5"/>
  </g>
  <!-- Funke über der Plattform -->
  <path d="M76 10l1.7 4.1 4.1 1.7-4.1 1.7L76 21.6l-1.7-4.1-4.1-1.7 4.1-1.7L76 10z" fill="#E8743F"/>

  <!-- Drei Figuren, die die Plattform tragen -->
  <!-- Links (Bernstein) -->
  <g>
    <circle cx="25" cy="53" r="7" fill="url(#lg-fig-amber)"/>
    <path d="M14 86V72c0-6.6 4.9-11 11-11s11 4.4 11 11v14H14z" fill="url(#lg-fig-amber)"/>
    <path d="M19 62l-3-17" stroke="#E89B2F" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Rechts (Koralle) -->
  <g>
    <circle cx="71" cy="53" r="7" fill="url(#lg-fig-coral)"/>
    <path d="M60 86V72c0-6.6 4.9-11 11-11s11 4.4 11 11v14H60z" fill="url(#lg-fig-coral)"/>
    <path d="M77 62l3.5-16.5" stroke="#E0633F" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Mitte (Petrol, leicht größer = Mensch im Zentrum) -->
  <g>
    <circle cx="48" cy="49" r="8" fill="url(#lg-fig-teal)"/>
    <path d="M36 86V70c0-7.2 5.4-12 12-12s12 4.8 12 12v16H36z" fill="url(#lg-fig-teal)"/>
    <path d="M41 59l-2-18" stroke="#0E5C51" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M55 59l2-18" stroke="#0E5C51" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>
